<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Surfin Bird Quest Premium social sharing image</title>
  <desc id="desc">Open Graph image for Surfin Bird Quest Premium, a premium gamified restaurant menu experience with Main and Enhanced Pro editions.</desc>

  <defs>
    <linearGradient id="bg" x1="68" y1="54" x2="1124" y2="586" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071226"/>
      <stop offset="0.48" stop-color="#153052"/>
      <stop offset="1" stop-color="#1E6A67"/>
    </linearGradient>
    <linearGradient id="accent" x1="214" y1="220" x2="816" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD166"/>
      <stop offset="0.5" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#45E0C2"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="0" fill="#06101D"/>
  <rect x="42" y="38" width="1116" height="554" rx="34" fill="url(#bg)"/>

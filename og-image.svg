  <circle cx="200" cy="520" r="126" fill="#FF8A3D" opacity="0.14" filter="url(#softGlow)"/>

  <rect x="92" y="88" width="182" height="40" rx="20" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.12)"/>
